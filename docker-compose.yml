# ================================================================
# 云端默认配置 — 仅 harnetics 服务，LLM/Embedding 通过设置页面配置
# 本地模型请使用: docker compose -f docker-compose-local.yml up -d
# ================================================================

services:
  harnetics:
    image: sam291/harnetics:latest
    container_name: harnetics
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./var:/app/var
      - ./fixtures:/app/fixtures
    environment:
      - HARNETICS_GRAPH_DB_PATH=/app/var/harnetics.db
      - HARNETICS_CHROMA_DIR=/app/var/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
