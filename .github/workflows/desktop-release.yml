name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish artifacts to, for example v0.1.2"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_tag || '' }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_suffix: x86_64-pc-windows-msvc.exe
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sidecar_suffix: aarch64-apple-darwin
          - label: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            sidecar_suffix: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Build backend sidecar
        run: uv run pyinstaller desktop/pyinstaller/harnetics-server.spec --noconfirm --clean

      - name: Prepare Tauri sidecar
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "dist/harnetics-server.exe" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          else
            cp "dist/harnetics-server" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
            chmod +x "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          fi

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: harnetics-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [desktop]
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-artifacts/**/*
