name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish artifacts to, for example v0.1.2"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_tag || '' }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_suffix: x86_64-pc-windows-msvc.exe
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sidecar_suffix: aarch64-apple-darwin
          - label: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            sidecar_suffix: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Build backend sidecar
        run: uv run pyinstaller desktop/pyinstaller/harnetics-server.spec --noconfirm --clean

      - name: Prepare Tauri sidecar
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "dist/harnetics-server.exe" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          else
            cp "dist/harnetics-server" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
            chmod +x "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          fi

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run build -- --target ${{ matrix.target }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: harnetics-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [desktop]
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Prepare release install guide
        shell: bash
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          VERSION="${TAG#v}"
          cat > release-install-guide.md <<EOF
          <!-- hermes-install-guide:start -->
          ## 下载哪个安装包？

          如果你是第一次下载安装包，请先看这里：

          - **Windows 10 / 11（64 位）**：下载 `Harnetics_${VERSION}_x64-setup.exe`
          - **macOS Apple Silicon（M1 / M2 / M3 / M4）**：下载 `Harnetics_${VERSION}_aarch64.dmg`
          - **macOS Intel（老款 Intel 芯片 Mac）**：下载 `Harnetics_${VERSION}_x64.dmg`
          - **Linux**：当前 release **不提供** Linux 桌面安装包

          ### 不确定自己是哪种 Mac？

          在 macOS 左上角点 ** → 关于本机**：

          - 如果看到 **芯片：Apple M1 / M2 / M3 / M4**，请下载 `aarch64.dmg`
          - 如果看到 **处理器：Intel**，请下载 `x64.dmg`

          ### 额外说明

          - 当前 macOS 安装包尚未完成 Apple notarization；如果遇到系统拦截，需要按未签名应用方式手动放行
          - 桌面安装包默认连接云端 OpenAI-compatible LLM / Embedding 服务；如需本地模型，请自行配置 Ollama
          <!-- hermes-install-guide:end -->
          EOF

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-artifacts/**/*

      - name: Upsert install guide in release body
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          gh release view "$TAG" --json body -q .body > current-release-body.md
          python - <<'PY'
          from pathlib import Path
          import re

          body_path = Path("current-release-body.md")
          guide_path = Path("release-install-guide.md")
          body = body_path.read_text(encoding="utf-8").rstrip()
          guide = guide_path.read_text(encoding="utf-8").strip()
          pattern = re.compile(
              r"\n*<!-- hermes-install-guide:start -->.*?<!-- hermes-install-guide:end -->\n*",
              re.S,
          )
          if pattern.search(body):
              new_body = pattern.sub("\n\n" + guide + "\n", body).strip() + "\n"
          else:
              new_body = (body + "\n\n" + guide + "\n").strip() + "\n"
          Path("updated-release-body.md").write_text(new_body, encoding="utf-8")
          PY
          gh release edit "$TAG" --notes-file updated-release-body.md
