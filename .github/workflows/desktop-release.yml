name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish artifacts to, for example v0.1.2"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_tag || '' }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_suffix: x86_64-pc-windows-msvc.exe
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sidecar_suffix: aarch64-apple-darwin
          - label: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            sidecar_suffix: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Build backend sidecar
        run: uv run pyinstaller desktop/pyinstaller/harnetics-server.spec --noconfirm --clean

      - name: Prepare Tauri sidecar
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "dist/harnetics-server.exe" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          else
            cp "dist/harnetics-server" "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
            chmod +x "desktop/src-tauri/binaries/harnetics-server-${{ matrix.sidecar_suffix }}"
          fi

      - name: Build desktop bundle
        working-directory: desktop
        run: npm run build -- --target ${{ matrix.target }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: harnetics-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [desktop]
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''

    steps:
      - uses: actions/checkout@v6

      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Prepare release install guide
        shell: bash
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          VERSION="${TAG#v}"
          python3 - <<'PY'
          from importlib.util import module_from_spec, spec_from_file_location
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          module_path = Path("src/harnetics/release_notes.py")
          spec = spec_from_file_location("release_notes_helper", module_path)
          if spec is None or spec.loader is None:
              raise RuntimeError(f"Unable to load release notes helper from {module_path}")
          module = module_from_spec(spec)
          spec.loader.exec_module(module)
          Path("release-install-guide.md").write_text(
              module.build_install_guide(version),
              encoding="utf-8",
          )
          PY

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-artifacts/**/*

      - name: Upsert install guide in release body
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body > current-release-body.md
          python3 - <<'PY'
          from importlib.util import module_from_spec, spec_from_file_location
          from pathlib import Path

          module_path = Path("src/harnetics/release_notes.py")
          spec = spec_from_file_location("release_notes_helper", module_path)
          if spec is None or spec.loader is None:
              raise RuntimeError(f"Unable to load release notes helper from {module_path}")
          module = module_from_spec(spec)
          spec.loader.exec_module(module)

          body = Path("current-release-body.md").read_text(encoding="utf-8")
          guide = Path("release-install-guide.md").read_text(encoding="utf-8")
          merged = module.merge_install_guide(body, guide)
          Path("updated-release-body.md").write_text(merged, encoding="utf-8")
          PY
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file updated-release-body.md
