<!DOCTYPE html>
<html lang="zh" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 | Harnetics</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content font-sans">
  <div class="navbar bg-base-100 shadow-sm px-4 mb-6">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost text-xl font-bold flex gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37..."></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        Harnetics
      </a>
      <ul class="menu menu-horizontal px-1 hidden lg:flex">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="documents.html">文档库</a></li>
        <li><a href="draft_new.html">草稿台</a></li>
        <li><a href="impact.html">变更影响</a></li>
        <li><a href="graph.html">图谱</a></li>
      </ul>
    </div>
  </div>

  <main class="container mx-auto max-w-7xl px-4 pb-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="stat bg-base-100 shadow-sm rounded-box border border-base-200">
        <div class="stat-figure text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <div class="stat-title">文档总数</div>
        <div class="stat-value text-primary">10</div>
        <div class="stat-desc">动力系统部</div>
      </div>
      <div class="stat bg-base-100 shadow-sm rounded-box border border-base-200">
        <div class="stat-figure text-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path></svg>
        </div>
        <div class="stat-title">跨文档关系</div>
        <div class="stat-value text-secondary">23</div>
        <div class="stat-desc text-secondary">+12 较上周</div>
      </div>
      <div class="stat bg-base-100 shadow-sm rounded-box border border-base-200">
        <div class="stat-figure text-error">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-8 h-8 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <div class="stat-title">过期引用 / 告警</div>
        <div class="stat-value text-error">3</div>
        <div class="stat-desc">需更新 downstream</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="card bg-base-100 shadow-sm border border-base-200">
        <div class="card-body">
          <h2 class="card-title border-b pb-2 mb-4">快捷操作</h2>
          <div class="grid grid-cols-2 gap-4">
            <a href="draft_new.html" class="btn btn-outline btn-primary h-24 flex flex-col justify-center gap-2">
              📝 生成对齐草稿
            </a>
            <a href="impact.html" class="btn btn-outline btn-secondary h-24 flex flex-col justify-center gap-2">
              📊 变更影响分析
            </a>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm border border-base-200">
        <div class="card-body">
          <h2 class="card-title border-b pb-2 mb-4">系统健康度</h2>
          <div class="space-y-4">
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span>引用最新版本率</span>
                <span class="font-mono">78%</span>
              </div>
              <progress class="progress progress-primary w-full" value="78" max="100"></progress>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span>ICD 参数一致性</span>
                <span class="font-mono">100%</span>
              </div>
              <progress class="progress progress-success w-full" value="100" max="100"></progress>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span>引注完整性</span>
                <span class="font-mono">72%</span>
              </div>
              <progress class="progress progress-warning w-full" value="72" max="100"></progress>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
