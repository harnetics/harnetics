<!DOCTYPE html>
<html lang="zh" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文档全局图谱 | Harnetics</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/vis-network.min.js"></script> -->
  <style>
    #mynetwork {
      width: 100%;
      height: 600px;
      border-radius: 0.5rem;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 text-base-content font-sans">
  <div class="navbar bg-base-100 shadow-sm px-4 mb-6">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost text-xl font-bold flex gap-2">Harnetics</a>
      <ul class="menu menu-horizontal px-1 hidden lg:flex">
        <li><a href="index.html">首页</a></li>
        <li><a href="documents.html">文档库</a></li>
        <li><a href="draft_new.html">草稿台</a></li>
        <li><a href="impact.html">变更影响</a></li>
        <li><a href="graph.html" class="active">图谱</a></li>
      </ul>
    </div>
  </div>

  <main class="container mx-auto max-w-7xl px-4 pb-12 w-full">
    <div class="mb-4">
      <h1 class="text-3xl font-bold">文档引注与依赖图谱</h1>
      <p class="text-base-content/70 mt-2">可视化掌握全域文档（以 ICD 为中心）的网络拓扑结构。</p>
    </div>

    <div class="card bg-base-100 shadow-sm border border-base-200 w-full mb-6">
      <div id="mynetwork" class="bg-slate-50/50">
        <!-- 静态占位以作演示，通常由 vis-network 库接管此 DOM -->
        <div class="w-full h-full flex flex-col items-center justify-center relative">
          <svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="opacity-70 stroke-primary/50 text-base-content" fill="none">
             <!-- Center node -->
            <circle cx="200" cy="150" r="30" fill="currentColor" class="text-primary"/>
            <text x="200" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="white">ICD-001</text>
            <!-- Surrounding nodes -->
            <circle cx="100" cy="100" r="20" fill="currentColor" class="text-secondary"/>
            <text x="100" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">SYS-001</text>
            
            <circle cx="300" cy="100" r="20" fill="currentColor" class="text-accent"/>
            <text x="300" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="white">TST-002</text>
            
            <circle cx="200" cy="250" r="20" fill="currentColor" class="text-info"/>
            <text x="200" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="white">FMA-001</text>
            
            <!-- Edges -->
            <line x1="117" y1="110" x2="174" y2="135" stroke-width="2" marker-end="url(#arrow)"/>
            <line x1="283" y1="110" x2="226" y2="135" stroke-width="2" marker-end="url(#arrow)"/>
            <line x1="200" y1="180" x2="200" y2="230" stroke-width="2" marker-end="url(#arrow)"/>
            
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
              </marker>
            </defs>
          </svg>
          <div class="mt-4 flex gap-4 text-xs font-mono absolute bottom-4">
             <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-primary block"></span> ICD (中心接口)</span>
             <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-secondary block"></span> 系统设计文档</span>
             <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-accent block"></span> 测试大纲</span>
             <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-info block"></span> 质量分析</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
